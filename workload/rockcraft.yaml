name: catalogue
summary: A service catalogue for workloads running in Juju.
description: A service catalogue for workloads running in Juju.
version: "0.15.0"
base: ubuntu@22.04
license: Apache-2.0

platforms:
  amd64:

parts:
  ui:
    plugin: npm
    source: ./ui
    npm-include-node: true
    npm-node-version: "20.18.3"
    override-build: |
      npm install
      npm run build
      mkdir -p ${CRAFT_PART_INSTALL}/web
      cp -R dist/* ${CRAFT_PART_INSTALL}/web/

  catalogue:
    plugin: nil
    source: .
    stage-packages:
      - nginx
    override-build: |
      mkdir -p ${CRAFT_PART_INSTALL}/etc/nginx
      cp ./nginx.conf ${CRAFT_PART_INSTALL}/etc/nginx/nginx.conf

services:
  catalogue:
    command: nginx -g 'daemon off;'
    override: replace
    startup: enabled
